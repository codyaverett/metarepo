# cargo-audit ignore list.
# Each entry is a transitive advisory we cannot patch directly; revisit
# when upstream dependencies (tokio, ratatui, git2) publish fixed versions.
[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste unmaintained (via ratatui)
    "RUSTSEC-2026-0002", # lru IterMut UB (transitive)
    "RUSTSEC-2026-0007", # bytes integer overflow (via tokio)
    "RUSTSEC-2026-0008", # git2 UB (via git2 0.18)
]
