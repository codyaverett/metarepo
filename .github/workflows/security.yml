name: Security Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security checks daily at 2 AM UTC
    - cron: '0 2 * * *'

# Default to read-only; the sarif-upload, security-report and notify jobs
# escalate to the specific scopes they need in their own permissions blocks.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch

      - name: Cache cargo registry
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --features=fix

      - name: Security Audit
        # Uses .cargo/audit.toml for transitive advisories we cannot patch.
        # Fails on any new vulnerability not listed there.
        run: cargo audit

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check Dependencies
        run: cargo deny check

  security-lints:
    name: Security Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          components: clippy

      - name: Run Clippy with Security Lints
        # Security-relevant lints are denied; pedantic/cargo groups stay as
        # warnings (they are aspirational, not security-blocking).
        run: |
          cargo clippy --all-features --all-targets -- \
            -D clippy::mem_forget \
            -D clippy::manual_memcpy \
            -D clippy::redundant_allocation \
            -D clippy::suspicious_operation_groupings \
            -D clippy::unused_io_amount \
            -W clippy::unwrap_used \
            -W clippy::expect_used \
            -W clippy::panic \
            -W clippy::pedantic \
            -W clippy::cargo

  unsafe-code-check:
    name: Check Unsafe Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch

      - name: Install cargo-geiger
        run: cargo install cargo-geiger

      - name: Check Unsafe Code Usage
        # Informational: transitive unsafe is expected (git2, tokio, etc.).
        # Review the output; non-fatal so CI does not block on dep churn.
        run: |
          cargo geiger --all-features || true
          echo "::notice::Review any unsafe code usage carefully"

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch

      - name: Run Security Tests
        run: cargo test -p metarepo --test security_tests

  fuzzing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly branch

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Initialize Fuzzing
        run: |
          cargo fuzz init || true

      - name: Create Fuzz Targets
        run: |
          mkdir -p fuzz/fuzz_targets
          cat > fuzz/fuzz_targets/command_injection.rs << 'EOF'
          #![no_main]
          use libfuzzer_sys::fuzz_target;

          fuzz_target!(|data: &[u8]| {
              if let Ok(s) = std::str::from_utf8(data) {
                  // Test command parsing with fuzzer input
                  let _ = metarepo::test_utils::assert_command_safe(s);
              }
          });
          EOF

      - name: Run Fuzzing (Limited Time)
        run: |
          cargo fuzz run command_injection -- -max_total_time=300 || true

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check Outdated Dependencies
        run: |
          cargo outdated --exit-code 1 || echo "::warning::Some dependencies are outdated"

  sarif-upload:
    name: Upload SARIF Results
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          components: clippy

      - name: Install clippy-sarif
        run: cargo install clippy-sarif sarif-fmt

      - name: Run Clippy and Generate SARIF
        run: |
          cargo clippy --all-features --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt

      - name: Upload SARIF Results
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        if: success() || failure()
        with:
          sarif_file: rust-clippy-results.sarif

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [security-audit, dependency-check, security-lints, security-tests]
    if: always()
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Generate Security Report
        run: |
          echo "# Security Report" > security-report.md
          echo "Generated on: $(date)" >> security-report.md
          echo "" >> security-report.md

          echo "## Summary" >> security-report.md
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> security-report.md
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> security-report.md
          echo "- Security Lints: ${{ needs.security-lints.result }}" >> security-report.md
          echo "- Security Tests: ${{ needs.security-tests.result }}" >> security-report.md

          echo "" >> security-report.md
          echo "## Recommendations" >> security-report.md

          if [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "- ⚠️  Fix security audit findings" >> security-report.md
          fi

          if [[ "${{ needs.dependency-check.result }}" != "success" ]]; then
            echo "- ⚠️  Review and update dependencies" >> security-report.md
          fi

          if [[ "${{ needs.security-lints.result }}" != "success" ]]; then
            echo "- ⚠️  Address security lint warnings" >> security-report.md
          fi

          if [[ "${{ needs.security-tests.result }}" != "success" ]]; then
            echo "- ⚠️  Fix failing security tests" >> security-report.md
          fi

      - name: Upload Security Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: security-report
          path: security-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.type != 'Bot'
        continue-on-error: true
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            })

  notify-security-issues:
    name: Notify Security Issues
    runs-on: ubuntu-latest
    needs: [security-audit, dependency-check]
    if: failure()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create Issue for Security Findings
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6.4.1
        with:
          script: |
            const title = '🔒 Security Issues Detected';
            const body = `
            ## Security Issues Found

            The automated security scan has detected potential issues:

            - **Security Audit**: ${{ needs.security-audit.result }}
            - **Dependency Check**: ${{ needs.dependency-check.result }}

            Please review the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ### Next Steps
            1. Review the security findings
            2. Update vulnerable dependencies
            3. Apply recommended fixes
            4. Re-run security tests

            **Priority**: HIGH
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'high-priority']
            });
