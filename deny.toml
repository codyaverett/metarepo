# cargo-deny configuration (v2 schema)
# Controls dependency advisories, licenses, banned crates, and sources.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# v2 schema: unmaintained scope — "workspace" only flags direct deps;
# "all" also flags transitive. We use "workspace" to avoid noise from
# transitive unmaintained crates we cannot control.
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Transitive, waiting on upstream patch releases.
    "RUSTSEC-2024-0436", # paste unmaintained (pulled via ratatui)
    "RUSTSEC-2026-0002", # lru IterMut UB (pulled transitively)
    "RUSTSEC-2026-0007", # bytes integer overflow (pulled via tokio)
    "RUSTSEC-2026-0008", # git2 UB (pulled via git2 0.18)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = [
    { name = "openssl", version = "<0.10" },
    { name = "term" },
    { name = "quickersort" },
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
